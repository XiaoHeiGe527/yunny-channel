<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>客户端首页</title>
    <script type="text/javascript" src="/static/plugins/jquery/jquery-3.1.1.min.js" ></script>
</head>
<body>

请输入用户ID<input type="text" id="userid"/>
         <input type="button" value="连接" onclick="connect()"/>   <br/>
请填写要发送的内容<input type="text" id="writeMsg"/>
         <input type="button" value="发送" onclick="sendMsg()"/>

<script type="text/javascript">
var ws = null;
var userid = $("#userid").val()
function connect(){
   if(userid!=null){
      if ('WebSocket' in window){
           ws = new WebSocket("ws://127.0.0.1:8081/socket/"+$("#userid").val());    
      }    
       else if ('MozWebSocket' in window){
           ws = new MozWebSocket("ws://127.0.0.1:8081/socket/"+$("#userid").val());    
       }
       else{
           alert("该浏览器不支持websocket");    
       }    
                     
       ws.onmessage = function(evt) {    
           alert(evt.data);    
       };    
           
       ws.onclose = function(evt) {    
           alert("连接中断");    
       };    
           
       ws.onopen = function(evt) {    
           alert("连接成功");    
       };  
   }else{
      alert("请输入用户ID");
   }
}    
    
function sendMsg() {    
	//ws.close()
    ws.send($("#writeMsg").val());    
}    
</script>
</body>
</html>
