#      logRetentionDays: 30

    # 异步线程配置
async:
  executor:
    thread:
      name:
        # 配置线程池中的线程的名称前缀
        prefix: async-service-
        # 配置最大线程数
      max_pool_size: 10
      # 配置核心线程数
      core_pool_size: 10
      # 配置队列大小
      queue_capacity: 9999

  #阿里云第三方服务配置



#图片上传类型配置
oss:
  image:
    types: .png,.jpg,.jpeg

#单IP限流
ipConfig:
  seconds: 60 #多少秒内
  rate: 150 # 单IP请求次数
  blacklistTime: 3600 #黑名单时间 默认86400秒为1天


