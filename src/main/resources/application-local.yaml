server:
  port: 8082
  tomcat:
    uri-encoding: UTF-8  # 添加这行，解决 URL 参数中文解码问题
spring:
  application:
    # Dubbo 应用名称
    name: yunny-channel
  # 配置rabbitmq的地址以及用户密码
  rabbitmq:
    host: 192.168.0.241
    port: 5672
    username: yunny
    password: 123456
    virtual-host: /local
    listener:
      simple:
        retry:
          enabled: false #是否开启消费者重试（为false时关闭消费者重试，这时消费端代码异常会一直重复收到消息）
          # max-attempts: 3 #最大重试次数
          # initial-interval: 3000 #重试间隔时间（单位毫秒）
          # max-interval: 1200000 #重试最大时间间隔（单位毫秒）
          # multiplier: 3 #应用于前一重试间隔的乘法器。

  #redis链接
  redis:
    host: 192.168.2.129
    port: 6379
    jedis:
      pool:
        max-active: 300
        max-wait: 10ms
        max-idle: 100
        min-idle: 20
    database: 0
    timeout: 60000ms
    password: 123456

  #数据库连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.2.129:3306/test_yunny?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: haiwai@sunfuwei521..

  #上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  freemarker:
    cache: false                    #控制Freemarker是否缓存编译后的模板。设置为false意味着每次请求时都会重新编译模板
    charset: UTF-8                  #设定Freemarker模板文件的字符编码。
    content-type: text/html         #设置Freemarker模板的输出内容类型。这里设为text/html，意味着Freemarker模板的输出将被视为HTML文本
    enabled: true                   #Freemarker模板引擎是否启用
    request-context-attribute: req #req??request 在模板中可以通过req访问HTTP请求相关的数据
    suffix: .ftl                    #指定Freemarker模板文件的默认后缀。这里设定为.ftl
    template-loader-path: classpath:/templates/ #指定Freemarker模板文件的加载位置

  # 静态资源
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/



#mybatis的相关配置
mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zhg.demo.mybatis.entity
  #开启驼峰命名
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

#  logback.logDir=./log
#  logback.level=debug

# 日志目录
logback:
  # 配置输出额日志文件名,可以带路径
  logDir: ./log
  level: error

### 调度中心部署跟地址 [选填]：如调度中心集群部署存在多个地址则用逗号分隔。执行器将会使用该地址进行"执行器心跳注册"和"任务结果回调"；为空则关闭自动注册；
